
<div class="row">
  <div class="col-md-8">
    <table class="table table-bordered">
      <tr><th>Condition</th><th>Clinical status</th><th>Verification status</th></tr>
      <tr ng-repeat="condition in lstConditions"
          style="cursor: pointer"
          ng-class="{listItemSelected:input.selectedCondition == condition}"
          ng-click="input.selectedCondition = condition">
        <td>{{condition.display}}</td>
        <td>{{condition.clinicalStatus}}</td>
        <td>{{condition.verificationStatus}}</td>

      </tr>
    </table>
  </div>

  <div class="col-md-4">
    <div class="pull-right">
      <button class="btn btn-link"
              ng-show="input.selectedCondition"
              ng-click="selectFromMainGraph(input.selectedCondition.resource)">Details</button>
    </div>
    <div class="clearfix"></div>

    <div class="myScroll1">
      <pre>{{input.selectedCondition.resource | json}}</pre>
    </div>

  </div>
</div>
